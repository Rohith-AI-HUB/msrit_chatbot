server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy all /api requests to the chat orchestrator
    location /api/ {
        proxy_pass            http://chat-orchestrator:8000/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;   # extended for parents-portal scraping (~30-60s)
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
    }

    # Disable caching for the HTML entry point so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Long-lived cache for hashed static assets (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
