version: "3.9"

services:

  # =============================================
  # APPLICATION SERVICES
  # =============================================

  chat-orchestrator:
    build:
      context: ./services
      dockerfile: chat-orchestrator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RETRIEVAL_SERVICE_URL=http://retrieval-service:8001
      - LLM_SERVICE_URL=http://llm-service:8002
      - SESSION_SERVICE_URL=http://session-service:8003
    depends_on:
      retrieval-service:
        condition: service_healthy
      llm-service:
        condition: service_healthy
      session-service:
        condition: service_healthy

  retrieval-service:
    build:
      context: ./services
      dockerfile: retrieval-service/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - VECTOR_DB_DIR=/app/data/chroma_db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  llm-service:
    build:
      context: ./services
      dockerfile: llm-service/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  session-service:
    build:
      context: ./services
      dockerfile: session-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # =============================================
  # DATA STORES
  # =============================================

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: msrit_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d msrit_chatbot"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  pg_data:
